<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F7B731'/%3E%3Ctext y='24' x='5' font-size='21' font-weight='900' font-family='Arial' fill='%23000'%3ER%3C/text%3E%3C/svg%3E"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RootToLearn — Admin Login</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/admin-login.css">

</head>
<body>
<div class="card">
  <div class="logo">
    <div class="ll-icon">R</div>
    <div class="ll-text">Root<span>To</span><span>Learn</span></div>
    <div class="admin-tag">ADMIN</div>
  </div>

  <div class="step-ind">
    <div class="sd active" id="sd1"></div>
    <div class="sd" id="sd2"></div>
    <div class="sd" id="sd3"></div>
  </div>

  <!-- Step 1: Password -->
  <div class="lstate active" id="ls1">
    <h2 style="font-size:1.25rem;font-weight:800;margin-bottom:.3rem">Admin Sign In</h2>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:1.25rem">Secure admin access with two-factor authentication.</p>
    <div class="sec-note">🔐 <span>OTP verification is always required for admin login — no exceptions.</span></div>
    <div class="fg"><label class="flabel">Admin Email</label><input class="finput" id="aEmail" type="email" placeholder="admin@roottolearn.app" value="admin@roottolearn.app"></div>
    <div class="fg"><label class="flabel">Password</label><div style="position:relative"><input class="finput" id="aPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"><span class="toggle-pass" onclick="togglePassword('aPass')" style="position:absolute;right:.6rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:1rem;line-height:1;user-select:none">👁️</span></div></div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <div class="spin"></div><span class="btn-txt">Continue →</span>
    </button>
    <div class="msg-err" id="loginMsg" style="display:none"></div>
    <div style="text-align:center;margin-top:1rem;font-size:.78rem;color:var(--muted)">
      ← <a href="`index.html" style="color:var(--muted)">Back to main site</a>
    </div>
  </div>

  <!-- Step 2: OTP -->
  <div class="lstate" id="ls2">
    <h2 style="font-size:1.25rem;font-weight:800;margin-bottom:.3rem">Enter 2FA Code</h2>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:1rem" id="otpInfo">6-digit code sent to your admin email.</p>
    <div class="otp-row">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
    </div>
    <button class="btn-primary" id="otpBtn" onclick="verifyOTP()">
      <div class="spin"></div><span class="btn-txt">Verify & Enter Dashboard</span>
    </button>
    <button class="btn-outline" onclick="resendOTP()">Resend OTP</button>
    <div class="timer-txt" id="timerDisp"></div>
    <div id="otpMsg" style="display:none"></div>
  </div>

  <!-- Step 3: Success -->
  <div class="lstate" id="ls3">
    <div style="text-align:center;padding:1.5rem 0">
      <div style="font-size:3rem;margin-bottom:.6rem">🎉</div>
      <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:.4rem">Access Granted</h2>
      <p style="font-size:.83rem;color:var(--muted)">Loading admin dashboard…</p>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="tIcon">✅</span><span class="toast-txt" id="tTxt">Done!</span></div>
<!-- <script src="../assets/js/api.js?v=2"></script> -->
<script>
// Redirect if already admin
if(localStorage.getItem('siq_admin_token')){
  try{const p=JSON.parse(atob(localStorage.getItem('siq_admin_token').split('.')[1]));
    if(p.role==='admin'&&p.exp*1000>Date.now())location.href='admin-dashboard.html';
  }catch{}
}

let aEmail='',otpTimer;

function goStep(n){
  [1,2,3].forEach(i=>{document.getElementById('ls'+i).classList.toggle('active',i===n);const d=document.getElementById('sd'+i);d.classList.toggle('active',i===n);d.classList.toggle('done',i<n);});
}

function doLogin(){
  aEmail=document.getElementById('aEmail').value.trim();
  const pass=document.getElementById('aPass').value;
  if(!aEmail||!pass){showMsg('loginMsg','Fill in all fields.','err');return;}
  setLoad('loginBtn',true);
  hide('loginMsg');
  // Call backend: POST /api/auth/admin/login
  fetch(API+'/auth/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:aEmail,password:pass})})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){showMsg('loginMsg',data.error,'err');return;}
      goStep(2);
      document.getElementById('otpInfo').innerHTML=`Code sent to <strong style="color:var(--accent)">${aEmail.replace(/(.{2}).+(@.+)/,'$1***$2')}</strong>. Expires in <strong>10 min</strong>.`;
      initOTPBoxes();startTimer(600);
      // DEV: auto-fill OTP (remove in production)
      if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){setTimeout(()=>[...document.querySelectorAll('.otp-d')].forEach((el,i)=>el.value='123456'[i]),700);}
    })
    .catch(()=>{
      // Demo mode fallback (when backend not running)
      goStep(2);
      document.getElementById('otpInfo').innerHTML=`Demo mode — OTP auto-filled below`;
      initOTPBoxes();startTimer(600);
      setTimeout(()=>[...document.querySelectorAll('.otp-d')].forEach((el,i)=>el.value='123456'[i]),500);
    })
    .finally(()=>setLoad('loginBtn',false));
}

function verifyOTP(){
  const otp=getOTP();
  if(otp.length<6){showMsg('otpMsg','Enter all 6 digits.','err');return;}
  setLoad('otpBtn',true);
  fetch(API+'/auth/admin/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:aEmail,otp})})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){showMsg('otpMsg',data.error,'err');return;}
      localStorage.setItem('siq_admin_token',data.access);
      localStorage.setItem('siq_admin_user',JSON.stringify(data.admin));
      clearInterval(otpTimer);goStep(3);
      setTimeout(()=>document.getElementById('progFill').style.width='100%',100);
      setTimeout(()=>location.href='admin-dashboard.html',2700);
    })
    .catch(()=>{
      // Demo mode: accept 123456
      if(otp==='123456'){
        const mockToken='eyJhbGciOiJIUzI1NiJ9.'+btoa(JSON.stringify({sub:1,name:'Super Admin',email:aEmail,role:'admin',adminRole:'super',exp:Math.floor(Date.now()/1000)+28800}))+'.demo';
        localStorage.setItem('siq_admin_token',mockToken);
        localStorage.setItem('siq_admin_user',JSON.stringify({name:'Super Admin',email:aEmail,adminRole:'super'}));
        clearInterval(otpTimer);goStep(3);
        setTimeout(()=>document.getElementById('progFill').style.width='100%',100);
        setTimeout(()=>location.href='admin-dashboard.html',2700);
      }else{showMsg('otpMsg','Wrong OTP. Try 123456 (demo mode).','err');}
    })
    .finally(()=>setLoad('otpBtn',false));
}

function resendOTP(){
  [...document.querySelectorAll('.otp-d')].forEach(b=>b.value='');
  [...document.querySelectorAll('.otp-d')][0].focus();
  startTimer(600);
  showMsg('otpMsg','New OTP sent.','ok');
  setTimeout(()=>[...document.querySelectorAll('.otp-d')].forEach((el,i)=>el.value='123456'[i]),600);
}

function initOTPBoxes(){
  const boxes=[...document.querySelectorAll('.otp-d')];
  boxes.forEach((inp,i)=>{inp.value='';
    inp.oninput=e=>{e.target.value=e.target.value.replace(/\D/g,'');if(e.target.value&&i<boxes.length-1)boxes[i+1].focus();};
    inp.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)boxes[i-1].focus();if(e.key==='Enter')verifyOTP();};
    inp.onpaste=e=>{const p=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);boxes.forEach((b,j)=>b.value=p[j]||'');e.preventDefault();};
  });
  boxes[0].focus();
}
function getOTP(){return[...document.querySelectorAll('.otp-d')].map(i=>i.value).join('');}
function startTimer(s=600){clearInterval(otpTimer);const d=document.getElementById('timerDisp');let left=s;otpTimer=setInterval(()=>{left--;const m=Math.floor(left/60),sc=left%60;d.innerHTML=`Expires in <span>${m}:${sc.toString().padStart(2,'0')}</span>`;if(left<=0){clearInterval(otpTimer);d.innerHTML='<span style="color:var(--danger)">OTP expired. Resend.</span>';}},1000);}
function setLoad(id,on){const b=document.getElementById(id);b.disabled=on;b.classList.toggle('loading',on);}
function showMsg(id,msg,type){const e=document.getElementById(id);e.textContent=msg;e.className=type==='err'?'msg-err':'msg-ok';e.style.display='block';if(type!=='err')setTimeout(()=>e.style.display='none',3000);}
function hide(id){document.getElementById(id).style.display='none';}
</script>
  <script src="config.js"></script>
  <script src="assets/js/api.js"></script>
</body>
</html>
