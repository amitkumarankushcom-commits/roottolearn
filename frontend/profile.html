<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F7B731'/%3E%3Ctext y='24' x='5' font-size='21' font-weight='900' font-family='Arial' fill='%23000'%3ER%3C/text%3E%3C/svg%3E"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RootToLearn</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/profile.css">
</head>
<body>
<nav class="nav">
  <div class="nav-logo" onclick="location.href='index.html'"><div class="li">R</div>Root<span>To</span><span>Learn</span></div>
  <div class="nav-links">
    <button class="nl" onclick="location.href='index.html'">Home</button>
    <button class="nl" onclick="location.href='app.html'">App</button>
    <button class="nl" onclick="location.href='pricing.html'">Pricing</button>
  </div>
  <div class="nav-right" id="navRight"></div>
</nav>
<div style="padding-top:60px">
<div class="profile-layout">
  <div>
    <div class="prof-card">
      <div class="av-lg" id="profAv">?</div>
      <div class="prof-name" id="profName">Loading…</div>
      <div class="prof-email" id="profEmail"></div>
      <div class="plan-badge" id="profPlan">🆓 Free Plan</div>
      <div class="prof-stats">
        <div class="pstat"><div class="pstat-v" id="ps1">0</div><div class="pstat-l">Docs</div></div>
        <div class="pstat"><div class="pstat-v" id="ps2">1</div><div class="pstat-l">Languages</div></div>
        <div class="pstat"><div class="pstat-v" id="ps3">0h</div><div class="pstat-l">Saved</div></div>
        <div class="pstat"><div class="pstat-v" id="ps4">3</div><div class="pstat-l">Quota</div></div>
      </div>
      <button class="btn-accent" style="width:100%;margin-top:1rem" onclick="location.href='app.html'">Open App →</button>
      <button class="btn-ghost" style="width:100%;margin-top:.5rem" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="hist-sec">
    <div style="font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:.9rem">Recent Summaries</div>
    <div id="histList"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"><span id="tIcon">✅</span><span class="toast-txt" id="tTxt">Done!</span></div>
<script src="/config.js"></script>
<script src="/assets/js/api.js?v=2"></script>
<script>
if(!isLoggedIn()){location.href='login.html';}
const u=getUser();
if(u && u.name){
  const init=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('profAv').textContent=init;
  document.getElementById('profName').textContent=u.name;
  document.getElementById('profEmail').textContent=u.email;
  document.getElementById('profPlan').textContent=u.plan==='pro'?'⚡ Pro Plan':u.plan==='enterprise'?'🏢 Enterprise':'🆓 Free Plan';
  const docs=parseInt(localStorage.getItem('siq_docs')||'0');
  document.getElementById('ps1').textContent=docs;
  document.getElementById('ps3').textContent=Math.round(docs*.25)+'h';
  document.getElementById('ps4').textContent=u.plan==='free'?`${3-docs}/3`:'∞';
  document.getElementById('navRight').innerHTML=`<span style="font-size:.8rem;color:var(--muted)">Hi, ${u.name.split(' ')[0]}</span><div class="user-av">${init}</div>`;
  hideProPurchaseUI();
} else {
  console.warn('[PROFILE] User logged in but data missing:', u);
}
const hist=JSON.parse(localStorage.getItem('siq_hist')||'[]');
const icons={pdf:'📄',ppt:'📊',pptx:'📊',mp3:'🎵',wav:'🎵',m4a:'🎵',text:'📝'};
const bgc={pdf:'rgba(255,71,87,.12)',ppt:'rgba(255,152,0,.12)',pptx:'rgba(255,152,0,.12)',mp3:'rgba(0,201,167,.12)',wav:'rgba(0,201,167,.12)',text:'rgba(139,92,246,.12)'};
document.getElementById('ps2').textContent=new Set(hist.map(h=>h.lang)).size||1;
document.getElementById('histList').innerHTML=hist.length?hist.map(h=>`<div class="hist-item"><div class="hi-thumb" style="background:${bgc[h.type]||'var(--surface2)'}">${icons[h.type]||'📁'}</div><div class="hi-info"><div class="hi-name">${h.name}</div><div class="hi-meta">${h.date} · ${h.words} words</div></div><span class="hi-lang">${h.lang}</span></div>`).join(''):'<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.85rem">No summaries yet. <a href="`app.html">Try the app →</a></div>';
function doLogout(){clearTokens();toast('👋','Signed out.');setTimeout(()=>location.href='index.html',800);}
</script>
</body>
</html>
