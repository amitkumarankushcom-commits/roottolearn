<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23F7B731'/%3E%3Ctext y='24' x='5' font-size='21' font-weight='900' font-family='Arial' fill='%23000'%3ER%3C/text%3E%3C/svg%3E"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RootToLearn</title>
<link rel="stylesheet" href="/assets/css/main.css">
<link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
<div class="card">
  <a class="logo" onclick="location.href='index.html'"><div class="li">R</div><div class="logo-text">Root<span>To</span><span>Learn</span></div></a>
  <div class="step-ind">
    <div class="sd active" id="sd1"></div>
    <div class="sd" id="sd2"></div>
    <div class="sd" id="sd3"></div>
  </div>

  <!-- Step 1: Credentials -->
  <div class="step show" id="s1">
    <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:.25rem">Welcome back</h2>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:1.35rem">Sign in to your account</p>
    <!-- <button class="social-btn" onclick="socialLogin('Google')">🔵 Continue with Google</button>
    <button class="social-btn" onclick="socialLogin('GitHub')">⚫ Continue with GitHub</button> -->
    <div class="divider">or</div>
    <div class="fg"><label class="flabel">Email</label><input class="finput" type="email" id="email" placeholder="you@example.com"></div>
    <div class="fg"><label class="flabel">Password</label><div class="pass-wrapper"><input class="finput pass-input" type="password" id="pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"><button type="button" class="toggle-pass" onclick="togglePassword('pass')">👁️</button></div></div>
    <button class="btn-go" id="loginBtn" onclick="doLogin()">
      <div class="spin"></div><span class="btn-txt">Sign In →</span>
    </button>
    <div id="loginErr" class="err" style="display:none"></div>
    <div class="link-row">Don't have an account? <a onclick="location.href='signup.html'">Sign up</a></div>
    <div class="link-row" style="margin-top:.35rem"><a onclick="location.href='forgot.html'">Forgot password?</a></div>
  </div>

  <!-- Step 2: OTP -->
  <div class="step" id="s2">
    <h2 style="font-size:1.2rem;font-weight:800;margin-bottom:.25rem">Enter OTP Code</h2>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:1rem" id="otpInfo">Code sent to your email</p>
    <div class="otp-row" id="otpBoxes">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-d" maxlength="1" type="text" inputmode="numeric">
    </div>
    <button class="btn-go" id="otpBtn" onclick="verifyOTP()">
      <div class="spin"></div><span class="btn-txt">Verify ✓</span>
    </button>
    <div class="link-row" style="margin-top:.65rem">
      Didn't get it? <a onclick="resend()">Resend OTP</a>
    </div>
    <div class="timer" id="timer"></div>
    <div id="otpErr" class="err" style="display:none"></div>
    <div id="otpOk"  class="ok"  style="display:none"></div>
  </div>

  <!-- Step 3: Success -->
  <div class="step" id="s3">
    <div style="text-align:center;padding:1.5rem 0">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🎉</div>
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:.4rem">Signed in!</h2>
      <p style="font-size:.85rem;color:var(--muted)">Redirecting to app…</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="tIcon">✅</span><span class="toast-txt" id="tTxt">Done!</span></div>
<script>
// Redirect if already logged in

let timerInt, userEmail = '';

function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('s'+i).classList.toggle('show', i===n);
    const d = document.getElementById('sd'+i);
    d.classList.toggle('active', i===n);
    d.classList.toggle('done', i<n);
  });
}

function socialLogin(p) {
  // Social login not yet implemented - direct to signup instead
  showErr('loginErr','Social login not yet available. Please sign up with email/password.');
}

async function doLogin() {
  userEmail = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;

  if (!userEmail || !pass) {
    showErr('loginErr','Fill in all fields.');
    return;
  }

  setLoad('loginBtn', true);

  try {
    const res = await auth.login({ email:userEmail, password:pass });
    const data = await res.json();

    console.log("LOGIN RESPONSE:", data); // 🔍 debug

    // ❌ HANDLE ERROR FIRST
    if (data.error) {
      console.log("LOGIN ERROR:", data.error);
      showErr('loginErr', data.error);
      return;
    }

    // ✅ OTP FLOW
    if (data.step === 'verify') {
      localStorage.setItem('login_email', userEmail);
      goStep(2);
      initOTP();
      startTimer(600);

      document.getElementById('otpInfo').innerHTML =
        `Code sent to <strong style="color:var(--accent)">
        ${(userEmail || localStorage.getItem('login_email') || '').replace(/(.{2}).+(@.+)/,'$1***$2')}
        </strong>`;
      return;
    }

    // ❌ fallback
    showErr('loginErr', 'Unexpected response.');

  } catch {
    showErr('loginErr','Network error.');
  } finally {
    setLoad('loginBtn', false);
  }
}

async function verifyOTP() {
  const otp = getOTPVal();
  if (otp.length<6) { showErr('otpErr','Enter all 6 digits.'); return; }
  if (!/^\d{6}$/.test(otp)) { showErr('otpErr','OTP must be exactly 6 digits.'); return; }
  setLoad('otpBtn', true);
  // Prefer userEmail var, fall back to localStorage, then prompt to re-login
  const emailToVerify = userEmail || localStorage.getItem('login_email') || '';
  if (!emailToVerify) {
    showErr('otpErr', 'Session expired. Please login again.');
    setTimeout(() => { goStep(1); }, 1500);
    setLoad('otpBtn', false);
    return;
  }
  console.log('Sending OTP verification:', { email: emailToVerify, otp, otpLength: otp.length });
  try {
    const res = await auth.loginVerify({ email:emailToVerify, otp });
    const data = await res.json();
    if (!res.ok) {
      if (data.error && (data.error.includes('expired') || data.error.includes('OTP not found'))) {
        showErr('otpErr', data.error.includes('OTP not found') ? 'OTP not found. Please login again.' : 'OTP expired. Click "Resend OTP" to get a new one.');
        if (data.error.includes('OTP not found')) {
          clearInterval(timerInt);
          setTimeout(() => { goStep(1); }, 1500);
        }
      } else {
        showErr('otpErr', data.error||'Invalid OTP.');
      }
      return;
    }
    // ✅ store tokens (backend returns 'access')
    setTokens(data.access, data.refresh || null);
    localStorage.setItem('siq_user', JSON.stringify(data.user));
    clearInterval(timerInt); goStep(3);
    setTimeout(() => location.href='index.html', 900);
  } catch { showErr('otpErr','Network error.'); }
  finally { setLoad('otpBtn', false); }
}

async function resend() {
  const emailToResend = userEmail || localStorage.getItem('login_email') || '';
  try {
    await auth.resendOTP({ email:emailToResend, purpose:'login' });
    [...document.querySelectorAll('.otp-d')].forEach(b=>b.value='');
    [...document.querySelectorAll('.otp-d')][0].focus();
    startTimer(600);
    toast('✉️', 'New OTP sent!');
  } catch (e) {
    showErr('otpErr', 'Failed to resend OTP. Try again.');
  }
}

function initOTP() {
  const boxes = [...document.querySelectorAll('.otp-d')];
  boxes.forEach((inp,i) => {
    inp.value='';
    inp.oninput = e => { e.target.value=e.target.value.replace(/\D/g,''); if(e.target.value && i<boxes.length-1) boxes[i+1].focus(); };
    inp.onkeydown = e => { if(e.key==='Backspace'&&!e.target.value&&i>0) boxes[i-1].focus(); if(e.key==='Enter') verifyOTP(); };
    inp.onpaste = e => { const p=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6); boxes.forEach((b,j)=>b.value=p[j]||''); e.preventDefault(); };
  });
  boxes[0].focus();
}
function getOTPVal() { return [...document.querySelectorAll('.otp-d')].map(i=>i.value).join(''); }
function startTimer(s=600) {
  clearInterval(timerInt); const d=document.getElementById('timer'); let left=s;
  timerInt=setInterval(()=>{ left--; const m=Math.floor(left/60),sc=left%60; d.innerHTML=`Expires in <span>${m}:${sc.toString().padStart(2,'0')}</span>`; if(left<=0){clearInterval(timerInt);d.innerHTML='<span style="color:var(--danger)">Expired. Resend.</span>';} },1000);
}
function setLoad(id,on){ const b=document.getElementById(id); b.disabled=on; b.classList.toggle('loading',on); }
function showErr(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; setTimeout(()=>e.style.display='none',4000); }
function showMsg(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function hide(id){ document.getElementById(id).style.display='none'; }
</script>
  <script src="config.js"></script>
  <script src="assets/js/api.js?v=2"></script>
  <script>if (isLoggedIn()) location.href = 'index.html';</script>
</body>
</html>
